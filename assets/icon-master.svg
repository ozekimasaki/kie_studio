<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2072"/>
      <stop offset="0.55" stop-color="#241a5e"/>
      <stop offset="1" stop-color="#140d36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.47" cy="0.44" r="0.6">
      <stop offset="0" stop-color="#7c6cf0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c6cf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#f6f3ff" stop-opacity="0.96"/>
      <stop offset="0.5" stop-color="#cbc3f6" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#9a8fe0" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- squircle background -->
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#glow)"/>

  <!-- incoming white beam -->
  <line x1="118" y1="468" x2="412" y2="504" stroke="#ffffff" stroke-width="26" stroke-linecap="round" opacity="0.28"/>
  <line x1="118" y1="468" x2="412" y2="504" stroke="#ffffff" stroke-width="13" stroke-linecap="round" opacity="0.92"/>

  <!-- spectrum rays: soft glow layer -->
  <g stroke-linecap="round" fill="none" opacity="0.30" stroke-width="30">
    <line x1="520" y1="498" x2="912" y2="322" stroke="#8b5cf6"/>
    <line x1="520" y1="504" x2="924" y2="436" stroke="#ff4d9d"/>
    <line x1="520" y1="510" x2="928" y2="552" stroke="#ffb347"/>
    <line x1="520" y1="516" x2="912" y2="666" stroke="#35e0e6"/>
  </g>
  <!-- spectrum rays: crisp layer -->
  <g stroke-linecap="round" fill="none" stroke-width="15">
    <line x1="520" y1="498" x2="912" y2="322" stroke="#a78bfa"/>
    <line x1="520" y1="504" x2="924" y2="436" stroke="#ff5fa8"/>
    <line x1="520" y1="510" x2="928" y2="552" stroke="#ffc25e"/>
    <line x1="520" y1="516" x2="912" y2="666" stroke="#43e6ec"/>
  </g>

  <!-- glass prism -->
  <path d="M470 282 L622 722 L318 722 Z" fill="url(#glass)" stroke="url(#edge)" stroke-width="7" stroke-linejoin="round"/>
  <!-- left facet highlight -->
  <path d="M470 282 L318 722 L470 722 Z" fill="#ffffff" opacity="0.12"/>
  <!-- apex sparkle -->
  <circle cx="470" cy="300" r="10" fill="#ffffff" opacity="0.85"/>
</svg>
